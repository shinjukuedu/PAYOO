<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main</title>
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-800">
       <header>
        <section class="max-w-md min-h-screen mx-auto py-6 bg-gray-200">
        <nav class="flex justify-around items-center">
            <img class="w-16" src="./assets/Group.png" alt="">
            <div>
                <h1  class="text-3xl font-bold"> $ <span id="main-balance">4500</span></h1>
                <p class="border rounded p-1">Available Balance</p>
            </div>
            <button class="btn">logout</button>
        </nav>
        
        <section class=" mt-6">
            <h1 class=" px-4 text-2xl font-bold mb-2">Welcome to Payoo!</h1>
            <p class="px-4">easy and convenient financial system of mobile Banking As well cash out charge is low.</p>
            <!-- card design  -->
            <div  class="card cursor-pointer m-2 gap-2 grid grid-cols-3">
                <div id="add-money-box" class="box border p-1 rounded-sm   text-center">
                    <img class="w-6 mx-auto" src="./assets/wallet1.png" alt="">
                    <p>Add Money</p>
                </div>
                <!-- another  -->
                 <div id="cash-out-money" class="box border rounded-sm p-1 text-center">
                    <img class="w-6 mx-auto" src="./assets/money1.png" alt="">
                    <p>Cashout</p>
                </div>
                <!-- final div  -->
                  <div class="box border rounded-sm p-1  text-center">
                    <img class="w-6 mx-auto" src="./assets/transaction1.png" alt="">
                    <p>Transfer Money</p>
                </div>
                <div class="box border p-1 rounded-sm   text-center">
                    <img class="w-6 mx-auto" src="./assets/bonus1.png" alt="">
                    <p>Get Bonus</p>
                </div>
                <!-- another  -->
                 <div class="box border rounded-sm p-1 text-center">
                    <img class="w-6 mx-auto" src="./assets/purse1.png" alt="">
                    <p>Pay Bill</p>
                </div>
                <!-- final div  -->
                  <div class="box border rounded-sm p-1  text-center">
                    <img class="w-6 mx-auto" src="./assets/send1.png" alt="">
                    <p>Transaction</p>
                </div>
            </div>
            <section id="addMoneys">
                <h2>Add Money</h2>
                 <div class="">
            <div class="hero-content flex-col lg:flex-row-reverse">
            
            <div class="card  w-full max-w-sm shrink-0 shadow-2xl">
            <div class="card-body">
                <legend required>Select Bank</legend>
                <select  class="select select-success">
                    <option disabled selected> Select Bank</option>
                    <option value="bkash">Bkash</option>
                    <option  value="nagad">Nagad</option>
                    <option  value="dbbl">DBBL</option>
                </select>
        <fieldset class="fieldset">
          <label class="label">Account Number</label>
          <input value="01993078451" required id="account-number" type="number" class="input" placeholder="Account Number" />
          <label class="label">Amount</label>
          <input  required id="amount" type="number" class="input" placeholder="Type your Amount" />
          <label class="label">Pin</label>
          <input value="1234" required id="account-pin" type="text" class="input" placeholder="Type Your Pin" />
          
         <button id="add-money" type="submit" class="btn border-none bg-blue-700 mt-4 text-white">Add Money</button>
        </fieldset>
            </div>
            </div>
        </div>
                 </div>
            </section>
        <section id="cash-out-sec">
           <!-- another section  -->
            <h2>Cashout</h2>
            <fieldset class="fieldset">
                <label class="label">Account Number</label>
                <input value="01993078451" required id="account-number" type="number" class="input" placeholder="Account Number" />
                <label class="label">Amount</label>
                <input  required id="cash-out-amount" type="number" class="input" placeholder="Type your Amount" />
                <label class="label">Pin</label>
                <input value="1234" required id="cashout-pin" type="text" class="input" placeholder="Type Your Pin" />
            
                <button id="cash-out" type="submit" class="btn border-none bg-blue-700 mt-4 text-white"> Cash Out </button>
                </fieldset>

        </section>
        </section>

       </section>
       </header>
        
    <script src="./js/addMoney.js"></script>
    <script src="./js/toggle.js"></script>
    <script src="./js/cashout.js"></script>
</body>
</html>
